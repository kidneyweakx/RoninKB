name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-test:
    name: Rust test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev libxdo-dev pkg-config \
            libdbus-1-dev libglib2.0-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build
        run: cargo build --workspace --features hhkb-core/hidapi-backend

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --features hhkb-core/hidapi-backend -- -D warnings

      - name: check hhkb-macos-native examples (macOS only)
        if: matrix.os == 'macos-latest'
        run: cargo build -p hhkb-macos-native --examples

  rust-features:
    name: Rust feature matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js (for embedded-ui check)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/hhkb-app/package-lock.json

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev libxdo-dev pkg-config \
            libdbus-1-dev libglib2.0-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-latest-features

      - name: check hhkb-core (firmware-write)
        run: cargo check -p hhkb-core --features firmware-write

      - name: check hhkb-daemon (tray)
        run: cargo check -p hhkb-daemon --features tray

      - name: check hhkb-daemon (clipboard)
        run: cargo check -p hhkb-daemon --features clipboard

      - name: check hhkb-daemon (tray + clipboard)
        run: cargo check -p hhkb-daemon --features tray,clipboard

      - name: Build frontend (required for embedded-ui)
        working-directory: apps/hhkb-app
        run: npm ci && npm run build

      - name: check hhkb-daemon (embedded-ui)
        run: cargo check -p hhkb-daemon --features embedded-ui

  frontend:
    name: Frontend (hhkb-app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/hhkb-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/hhkb-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: hhkb-app-dist
          path: apps/hhkb-app/dist
          if-no-files-found: error

  summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [rust-test, rust-features, frontend]
    steps:
      - name: Report success
        run: echo "All checks passed"
