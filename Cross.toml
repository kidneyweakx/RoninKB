# Cross-compilation deps for `cross build`.
# btleplug (Bluetooth) pulls libdbus-sys; hidapi pulls libudev. Both need
# the matching arm64 sysroot packages installed inside the cross container.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update",
    "apt-get install -y libudev-dev:arm64 libdbus-1-dev:arm64 libglib2.0-dev:arm64 pkg-config",
]

[target.aarch64-unknown-linux-gnu.env]
# Tell pkg-config to find arm64 .pc files when cross-compiling.
PKG_CONFIG_ALLOW_CROSS = "1"
PKG_CONFIG_PATH = "/usr/lib/aarch64-linux-gnu/pkgconfig"
